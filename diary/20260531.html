  <h1>20260531</h1>

<p>体調が悪い。のどが痛い。悪寒と頭痛。出町柳の用事も泣く泣くキャンセルし、徹底の自宅待機。しかし熱はない。</p>
<p></p>
<p>『演出をさがして』のブレッソンの章を読む。私がいかに映画を観ていないかが己自身に筒抜けになるような会話。ブレッソンは音。</p>
<p></p>
<p>小説と脚本を書き始める。頭の中でイメージが醸成されていたのかすらすらと出力される。こういうものはずっと頭にあったってしょうがない。</p>
<p></p>
<p>焼きそばを作って食べる。しんどい。これは明日も自宅待機かと思って、風呂にも入らず寝る。</p>
