  <h1>20260628</h1>

<p>早朝5時に就寝し、いてもたってもいられなくなり昼前に起き、日吉ダムへ行く。JR日吉駅を降りて、思ったより歩く。トンネルをくぐって、道を間違えて、到着。山の中に突如そびえ立つ壁の前には円状の歩道がある。ここはちょっとした道の駅になっていて、芝生やテント、キャンプファイヤーが目立つ。暗くなってきたので駅へ戻るとホームに虫がたかっていて吐き気がする。京都駅に戻ったのは21時半ごろ。ビビンバ丼を求めすき家に駆け込むとこの店舗ではやっていないらしく、仕方なく焼肉丼を頼み帰宅。</p>
