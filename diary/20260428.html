  <h1>20260428</h1>

<p>今日到着予定だった『白夜』ブルーレイの発送が延期になったようで。不穏な一日。バイト先でも「今日なんか不穏ですね」と言いふらしていた。こんなことを言う奴は早く帰ればいいと思う。</p>
<p></p>
<p>部室においてある荷物を取りに大学へ行くと部員達とばったり会い、そのままインドカレーを食べに行く。そういえば昼もカレーだったが、洋風のカレーライスとナンで食べるインドカレーは全くの別物と認識しているため問題ない。</p>
<p></p>
<p>正文が死んだ。享年3歳。新しく生まれたたまごっちに正文と名を付け、餌をやって寝る。</p>
