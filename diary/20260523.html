<p>カレーを作る。カルディで買ったほうれん草レトルトを茄子人参ひき肉に混ぜる。ペースト状になった。ドライカレーには抵抗感があるが、自分の作った料理だから美味しい。食べながら映画美学校のガイダンスを受ける。脚本へのモチベ高まる。</p>
晩。魁力屋はクレジットが使えて嬉しいし、たくあんが分厚すぎる。しかし今日はラーメンじゃなくても良かったと思いながら店を出ると雨が降った形跡。ちょうど雨宿りになったようだが、家で残ったカレーを食べていれば雨なんか気にしなくてもいいわけで。</p>
