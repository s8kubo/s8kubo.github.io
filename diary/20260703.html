  <h1>20260703</h1>

<p>吉田寮食堂で催されるコメディ演劇の開園時間に間に合わず、家に引きこもる。しかしただ家にいても食事が提供されるわけではないので寝台船に行く。どうやら明日で6周年らしく。私もすっかり常連である。ここではタバコを際限なく吸っていい、というマイルール。私は弁えているので、肺がんになっても店主に治療費を請求しない。タバコは責任能力を鍛える良い道具だ。</p>
