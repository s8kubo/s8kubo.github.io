  <h1>20260518</h1>

<p>今日から大学でのバイトを再開する。朝7時半に起きる身体になってしまった。こっちのほうが健康的なので特に文句はないが、バイトなど、金銭が関わる予定には遅刻できないので、強迫的に著しい早起きをしてしまう。5時半とかに1回起きてまた寝て、6時半にまた起床......といった有様。体調も万全とは言い難い。早起きの自動化はまだまだ先の話。</p>
<p>盛大な昼寝の後、飲みに誘われ寝台船へ。奥の座敷でたくさん飲んでカチコチのチャーシューを齧りながら花火をした。今年は何回できるだろう。人生のうちで何回できるだろう。</p>
