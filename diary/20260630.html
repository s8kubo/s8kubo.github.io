  <h1>20260630</h1>

<p>脚本を直していたため3時間睡眠で京都駅へ。映画を撮るのは1年ぶりで、最初の数ショットこそもたもたしたものの、おおむね時間通りにテキパキ撮影できた。梅雨といえども正午の外は暑く、足早に京都を去る。</p>
<p></p>
<p>ダムへ行く。ロケハンをしっかりしたのでこちらもテキパキ進む。ストレスフリーな現場だと俳優の表情も豊かに見える。何かに引っ張られていると表情も強張ってしまうものだ。</p>
<p></p>
<p>田舎で電車の本数が少なく、ダム付近の定食屋でトンカツを食べて帰宅。すぐに素材の編集をして制作グループに投稿し、メンバーの士気を上げる。</p>
