  <h1>20260413</h1>

<p>16時起床。寝過ぎて頭が痛い。塾に向かいバイトをし、ラーメンを食べると23時。なんとなくコンビニでシュークリームとラッキーストライクを買って帰る。まだやっていない手続きがある。図書館で借りた『シネマトグラフ覚書』は付箋が貼られたまま返却期限を大幅超過している。これを読む大学生なんかうちの大学に居ないのだからいいだろう、しかし決まりは決まりである。</p>
<p></p>
<p>カフカの『城』を少し読む。きっと長い戦いになる。</p>
