  <h1>20260416</h1>

<p>早起き。規則正しい午前を過ごす。30分ほどの徒歩とカフェのカツカレー。</p>
<p>午後は山登りゼミ。去年のこの時期も登った大文字山。山登りは普段の運動不足を暴くために存在している。作業日誌を読んでいる人がおり。私もその一人である。</p>
<p>下山し解散。残った皆でおにぎりを食べて写真を現像しに行く。値段が高くなっている気もするし、元々こんな値段だったような気もする。大学で大喜利をして、寒い中帰宅する頃にはデータが届いていた。</p>
