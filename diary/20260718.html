  <h1>20260718</h1>

<p>最近の土曜日は昼に起きるのが習慣になってきている。平日の睡眠時間は取れているはずだが、ななまがり森下みたいに必要睡眠時間が14時間とかだったらしょうがない。私はバイトで過労死してしまうかもしれない。</p>
<p></p>
<p>つけ麺を食べる。辛いスープを頼んだら想像より辛く、あの忌まわしき火鍋を思い出してしまったが無事感触。帰宅途中に雨が降りテンション下がりながら自転車のペダルを漕ぐ。</p>
<p></p>
<p>四条へ映画を観に行きたいが、今日のあそこは祇園祭で激混みと予想。当然地下鉄に乗るだけでもハードであり、結局家で大人しくする羽目になった。</p>
