  <h1>20260506</h1>

<p>外出着のまま昼前まで寝ていた。電気を付けたまま寝ていて睡眠効率が悪かったのか、頭に靄がかかった気になっている。朦朧とした意識のまま近所のスーパーに出かけると雨が降り始めた。最近の休日を端的に表した天候。</p>
<p></p>
<p>フランコ・モレッティ『遠読』を読み始める。読書会の予習として。精読ではなく、広角レンズで全体を見渡し、地図を眺めるようにして研究する遠読、という事らしい。やりたいことはなんとなく分かるが、何せ掴みどころのない文章が続くため変な時間に眠ってしまった。</p>
